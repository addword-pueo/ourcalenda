<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>잠금화면 달력</title>
<style>
  :root{
    --text:#fff; --sub:rgba(235,235,245,.62);
    --glass:rgba(30,30,40,.46); --glass2:rgba(255,255,255,.08);
    --stroke:rgba(255,255,255,.16); --stroke-hi:rgba(255,255,255,.32);
    --accent:#ff453a; --blue:#64b5ff;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Apple SD Gothic Neo",system-ui,sans-serif;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    max-width:480px;margin:0 auto;
    background:#000;
  }
  .wrap{padding:14px 16px 40px}
  /* glass primitives */
  .glass{
    background:var(--glass);
    -webkit-backdrop-filter:blur(28px) saturate(180%);
    backdrop-filter:blur(28px) saturate(180%);
    border:1px solid var(--stroke);
    box-shadow:0 8px 32px rgba(0,0,0,.18), inset 0 1px 0 var(--stroke-hi);
  }
  /* month nav */
  .monthnav{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 12px}
  .monthlabel{font-size:30px;font-weight:800;letter-spacing:-.6px}
  .monthlabel small{font-size:15px;font-weight:600;color:var(--sub);margin-left:6px}
  .nav-group{display:flex;gap:6px;align-items:center}
  .nav-btn{
    color:var(--accent);width:36px;height:36px;border-radius:12px;
    font-size:18px;font-weight:700;cursor:pointer;
  }
  .today-btn{
    color:var(--accent);height:36px;padding:0 13px;border-radius:12px;
    font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  }
  /* calendar card */
  .cal{border-radius:24px;padding:14px 8px 10px}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
  .weekdays span{text-align:center;font-size:11px;font-weight:700;color:var(--sub)}
  .weekdays span:first-child{color:var(--accent)}
  .weekdays span:last-child{color:var(--blue)}
  .grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cell{
    min-height:78px;padding:5px 1px;border-radius:12px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:2px;
    transition:background .15s;
  }
  .cell:active{background:var(--glass2)}
  .cell.has-ev{background:var(--glass2);box-shadow:inset 0 1px 0 var(--stroke)}
  .cell .num{
    font-size:14px;font-weight:600;width:24px;height:24px;line-height:24px;
    text-align:center;border-radius:50%;
  }
  .cell.sun .num{color:var(--accent)}
  .cell.sat .num{color:var(--blue)}
  .cell.today .num{
    background:var(--accent);color:#fff;font-weight:800;
    box-shadow:0 2px 10px rgba(255,69,58,.5), inset 0 1px 0 rgba(255,255,255,.4);
  }
  .cell.other{opacity:.22}
  .ev{
    font-size:9px;font-weight:700;line-height:1.25;max-width:100%;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px;
  }
  .more{font-size:8.5px;color:var(--sub);font-weight:700}
  .export-btn{
    width:100%;margin-top:16px;height:52px;border:none;background:none;
    color:#fff;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:-.3px;
    font-family:inherit;
  }
  /* bottom sheet */
  .dim{position:fixed;inset:0;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .2s;z-index:10}
  .dim.show{opacity:1;pointer-events:auto}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;z-index:11;
    border-radius:26px 26px 0 0;padding:18px 18px calc(24px + env(safe-area-inset-bottom));
    transform:translateY(105%);transition:transform .28s cubic-bezier(.32,.72,.27,1);
    border-bottom:none;
  }
  .sheet.show{transform:translateY(0)}
  .grabber{width:40px;height:5px;border-radius:3px;background:var(--stroke-hi);margin:-6px auto 12px;opacity:.7}
  .sheet h3{font-size:18px;font-weight:800;margin-bottom:12px;letter-spacing:-.3px}
  .ev-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;max-height:32vh;overflow-y:auto}
  .ev-row{
    display:flex;align-items:center;gap:10px;border-radius:14px;padding:10px 12px;
    background:var(--glass2);border:1px solid var(--stroke);
  }
  .dot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor}
  .ev-row span{flex:1;font-size:14px;font-weight:600}
  .del{border:none;background:none;color:var(--sub);font-size:18px;cursor:pointer;padding:0 2px}
  .empty{font-size:13px;color:var(--sub);text-align:center;padding:8px 0 12px}
  .input-row{display:flex;gap:8px}
  .input-row input{
    flex:1;height:48px;border-radius:15px;border:1px solid var(--stroke);
    background:var(--glass2);color:var(--text);font-size:15px;padding:0 14px;outline:none;
    font-family:inherit;
  }
  .input-row input::placeholder{color:var(--sub)}
  .add-btn{
    width:66px;height:48px;border:1px solid rgba(255,255,255,.35);border-radius:15px;
    background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.05)),var(--accent);
    color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
  }
  .colors{display:flex;gap:10px;margin-top:14px;justify-content:center}
  .sw{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;box-shadow:0 2px 8px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.45)}
  .sw.sel{border-color:var(--text)}
  /* export overlay */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:20;display:none;
    flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px;
    -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  }
  .overlay.show{display:flex}
  .overlay img{max-height:64vh;max-width:82vw;border-radius:20px;box-shadow:0 12px 48px rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.2)}
  .overlay p{color:#fff;font-size:13.5px;text-align:center;line-height:1.6;opacity:.92}
  .overlay .btns{display:flex;gap:10px}
  .overlay button,.overlay a{
    height:46px;padding:0 22px;border-radius:15px;border:1px solid rgba(255,255,255,.3);
    font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;
    text-decoration:none;font-family:inherit;
  }
  .dl{background:rgba(255,255,255,.92);color:#000}
  .close{background:rgba(255,255,255,.14);color:#fff;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
</style>
</head>
<body>
<div class="wrap">
  <div class="monthnav">
    <div class="monthlabel" id="monthLabel"></div>
    <div class="nav-group">
      <button class="today-btn glass" id="todayBtn">오늘</button>
      <button class="nav-btn glass" id="prevBtn">‹</button>
      <button class="nav-btn glass" id="nextBtn">›</button>
    </div>
  </div>

  <div class="cal glass">
    <div class="weekdays">
      <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <button class="export-btn" id="exportBtn">잠금화면 이미지 만들기</button>
</div>

<!-- bottom sheet -->
<div class="dim" id="dim"></div>
<div class="sheet glass" id="sheet">
  <div class="grabber"></div>
  <h3 id="sheetTitle"></h3>
  <div class="ev-list" id="evList"></div>
  <div class="input-row">
    <input type="text" id="evInput" placeholder="일정 입력 (예: 결혼기념일 💍)" maxlength="20">
    <button class="add-btn" id="addBtn">추가</button>
  </div>
  <div class="colors" id="colorRow"></div>
</div>

<!-- export overlay -->
<div class="overlay" id="overlay">
  <img id="resultImg" alt="잠금화면 달력">
  <p>이미지를 <b>길게 눌러</b> “사진에 추가”를 선택하세요.<br>그다음 설정 › 배경화면 › 새로운 배경화면 추가에서 적용!</p>
  <div class="btns">
    <a class="dl" id="dlLink" download="lockscreen-calendar.png">다운로드</a>
    <button class="close" id="closeBtn">닫기</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  var COLORS = ["#ff6961","#ffb340","#ffd60a","#30d158","#64b5ff","#da8fff"];
  var $ = function(id){ return document.getElementById(id); };

  /* ---------- state ---------- */
  var store;
  try { store = JSON.parse(localStorage.getItem("lcal") || "{}"); } catch(e){ store = {}; }
  var events = store.events || {};            // {"2026-06-07":[{t:"text",c:"#hex"}]}
  var device = store.device || "1080x2340";
  var now = new Date();
  var curY = now.getFullYear(), curM = now.getMonth();
  var selDate = null, selColor = COLORS[0];

  function save(){
    try { localStorage.setItem("lcal", JSON.stringify({events:events, device:device})); } catch(e){}
  }
  function key(y,m,d){ return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0"); }

  /* ---------- calendar render ---------- */
  function render(){
    $("monthLabel").innerHTML = (curM+1) + "월 <small>" + curY + "</small>";
    var grid = $("grid"); grid.innerHTML = "";
    var first = new Date(curY,curM,1).getDay();
    var days  = new Date(curY,curM+1,0).getDate();
    var prevDays = new Date(curY,curM,0).getDate();
    var total = Math.ceil((first+days)/7)*7;
    var today = new Date();

    for(var i=0;i<total;i++){
      var cell = document.createElement("div");
      cell.className = "cell";
      var d, inMonth = true;
      if(i < first){ d = prevDays-first+1+i; inMonth=false; }
      else if(i >= first+days){ d = i-first-days+1; inMonth=false; }
      else d = i-first+1;

      var dow = i%7;
      if(dow===0) cell.classList.add("sun");
      if(dow===6) cell.classList.add("sat");
      if(!inMonth) cell.classList.add("other");
      if(inMonth && curY===today.getFullYear() && curM===today.getMonth() && d===today.getDate())
        cell.classList.add("today");

      var num = document.createElement("div");
      num.className="num"; num.textContent=d;
      cell.appendChild(num);

      if(inMonth){
        var k = key(curY,curM,d);
        var list = events[k]||[];
        if(list.length) cell.classList.add("has-ev");
        for(var j=0;j<Math.min(list.length,3);j++){
          var ev = document.createElement("div");
          ev.className="ev"; ev.textContent=list[j].t; ev.style.color=list[j].c;
          cell.appendChild(ev);
        }
        if(list.length>3){
          var mo=document.createElement("div"); mo.className="more"; mo.textContent="+"+(list.length-3);
          cell.appendChild(mo);
        }
        (function(kk){ cell.onclick=function(){ openSheet(kk); }; })(k);
      }
      grid.appendChild(cell);
    }
  }
  $("prevBtn").onclick=function(){ curM--; if(curM<0){curM=11;curY--;} render(); };
  $("nextBtn").onclick=function(){ curM++; if(curM>11){curM=0;curY++;} render(); };
  $("todayBtn").onclick=function(){ var n=new Date(); curY=n.getFullYear(); curM=n.getMonth(); render(); };

  /* ---------- bottom sheet ---------- */
  function openSheet(k){
    selDate=k;
    var p=k.split("-");
    var dt=new Date(+p[0],+p[1]-1,+p[2]);
    var dows=["일","월","화","수","목","금","토"];
    $("sheetTitle").textContent = +p[1]+"월 "+(+p[2])+"일 ("+dows[dt.getDay()]+")";
    renderEvList();
    $("dim").classList.add("show"); $("sheet").classList.add("show");
  }
  function closeSheet(){
    $("dim").classList.remove("show"); $("sheet").classList.remove("show");
    $("evInput").blur();
  }
  $("dim").onclick=closeSheet;

  function renderEvList(){
    var box=$("evList"); box.innerHTML="";
    var list=events[selDate]||[];
    if(!list.length){ box.innerHTML='<div class="empty">아직 일정이 없어요</div>'; return; }
    list.forEach(function(ev,idx){
      var row=document.createElement("div"); row.className="ev-row";
      var dot=document.createElement("div"); dot.className="dot";
      dot.style.background=ev.c; dot.style.color=ev.c;
      var sp=document.createElement("span"); sp.textContent=ev.t;
      var del=document.createElement("button"); del.className="del"; del.textContent="✕";
      del.onclick=function(){
        list.splice(idx,1);
        if(!list.length) delete events[selDate];
        save(); renderEvList(); render();
      };
      row.appendChild(dot); row.appendChild(sp); row.appendChild(del);
      box.appendChild(row);
    });
  }

  /* color swatches */
  COLORS.forEach(function(c,i){
    var s=document.createElement("div");
    s.className="sw"+(i===0?" sel":""); s.style.background=c;
    s.onclick=function(){
      selColor=c;
      document.querySelectorAll(".sw").forEach(function(x){x.classList.remove("sel");});
      s.classList.add("sel");
    };
    $("colorRow").appendChild(s);
  });

  function addEvent(){
    var t=$("evInput").value.trim();
    if(!t||!selDate) return;
    (events[selDate]=events[selDate]||[]).push({t:t,c:selColor});
    $("evInput").value="";
    save(); renderEvList(); render();
  }
  $("addBtn").onclick=addEvent;
  $("evInput").addEventListener("keydown",function(e){ if(e.key==="Enter") addEvent(); });

  /* ---------- glass helpers (canvas) ---------- */
  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }
  function glassPanel(ctx,x,y,w,h,r,dark){
    // drop shadow
    ctx.save();
    ctx.shadowColor="rgba(0,0,0,"+(dark?0.45:0.18)+")";
    ctx.shadowBlur=r*1.2;
    ctx.shadowOffsetY=r*0.35;
    roundRect(ctx,x,y,w,h,r);
    var fg=ctx.createLinearGradient(0,y,0,y+h);
    if(dark){
      fg.addColorStop(0,"rgba(255,255,255,0.13)");
      fg.addColorStop(0.5,"rgba(255,255,255,0.07)");
      fg.addColorStop(1,"rgba(255,255,255,0.05)");
    } else {
      fg.addColorStop(0,"rgba(255,255,255,0.62)");
      fg.addColorStop(0.5,"rgba(255,255,255,0.42)");
      fg.addColorStop(1,"rgba(255,255,255,0.38)");
    }
    ctx.fillStyle=fg;
    ctx.fill();
    ctx.restore();
    // border: bright top → faint bottom
    var sg=ctx.createLinearGradient(0,y,0,y+h);
    sg.addColorStop(0, dark?"rgba(255,255,255,0.45)":"rgba(255,255,255,0.95)");
    sg.addColorStop(0.25, dark?"rgba(255,255,255,0.18)":"rgba(255,255,255,0.6)");
    sg.addColorStop(1, dark?"rgba(255,255,255,0.07)":"rgba(255,255,255,0.35)");
    ctx.strokeStyle=sg;
    ctx.lineWidth=Math.max(1.5, w*0.002);
    roundRect(ctx,x,y,w,h,r);
    ctx.stroke();
    // top inner glow
    var hg=ctx.createLinearGradient(0,y,0,y+h*0.18);
    hg.addColorStop(0, dark?"rgba(255,255,255,0.10)":"rgba(255,255,255,0.55)");
    hg.addColorStop(1, "rgba(255,255,255,0)");
    ctx.save();
    roundRect(ctx,x,y,w,h,r);
    ctx.clip();
    ctx.fillStyle=hg;
    ctx.fillRect(x,y,w,h*0.18);
    ctx.restore();
  }

  /* ---------- export to canvas ---------- */
  function draw(){
    var wh=device.split("x"), W=+wh[0], H=+wh[1];
    var cv=document.createElement("canvas"); cv.width=W; cv.height=H;
    var ctx=cv.getContext("2d");
    var dark = true;
    var C = {text:"#ffffff",sub:"rgba(235,235,245,0.62)",accent:"#ff6961",blue:"#74baff",
             chip:"rgba(255,255,255,0.07)"};
    var F='-apple-system,"SF Pro Display","Apple SD Gothic Neo",system-ui,sans-serif';

    // plain black background
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,W,H);

    /* layout */
    var top=H*0.262;                    // reserved for iOS clock
    var px=W*0.045;                     // panel side margin
    var panelW=W-px*2;
    var m=px+W*0.045;                   // content margin
    var innerW=W-m*2;
    var cellW=innerW/7;

    var ty=top;                         // month title baseline
    var wy=ty+W*0.082;                  // weekday baseline
    var gy=wy+W*0.045;                  // grid top

    var first=new Date(curY,curM,1).getDay();
    var days=new Date(curY,curM+1,0).getDate();
    var rows=Math.ceil((first+days)/7);
    var bottomPad=H*0.055;
    var cellH=(H-gy-bottomPad-W*0.04)/rows;
    var maxCellH=W*0.30;
    if(cellH>maxCellH) cellH=maxCellH;

    var panelY=ty-W*0.105;
    var panelH=(gy+cellH*rows+W*0.04)-panelY;

    // glass panel
    glassPanel(ctx, px, panelY, panelW, panelH, W*0.06, dark);

    // month title
    ctx.textBaseline="alphabetic";
    var mt=(curM+1)+"월";
    ctx.font="800 "+Math.round(W*0.078)+"px "+F;
    var tw=ctx.measureText(mt).width;
    ctx.fillStyle=C.accent;
    ctx.fillText(mt,m,ty);
    ctx.font="600 "+Math.round(W*0.032)+"px "+F;
    ctx.fillStyle=C.sub;
    ctx.fillText(String(curY), m+tw+W*0.022, ty);

    // weekday row
    ctx.font="700 "+Math.round(W*0.027)+"px "+F;
    ctx.textAlign="center";
    var dows=["일","월","화","수","목","금","토"];
    for(var i=0;i<7;i++){
      ctx.fillStyle = i===0?C.accent : i===6?C.blue : C.sub;
      ctx.fillText(dows[i], m+cellW*i+cellW/2, wy);
    }
    // divider
    var dg=ctx.createLinearGradient(m,0,W-m,0);
    dg.addColorStop(0,"rgba(255,255,255,0)");
    dg.addColorStop(0.5, dark?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.9)");
    dg.addColorStop(1,"rgba(255,255,255,0)");
    ctx.strokeStyle=dg; ctx.lineWidth=Math.max(1,W*0.0013);
    ctx.beginPath(); ctx.moveTo(m,wy+W*0.02); ctx.lineTo(W-m,wy+W*0.02); ctx.stroke();

    // dates + events
    var today=new Date();
    var numF=Math.round(W*0.036);
    var evF=Math.round(W*0.024);
    var evLH=evF*1.45;

    function truncate(txt,maxW){
      if(ctx.measureText(txt).width<=maxW) return txt;
      while(txt.length>1 && ctx.measureText(txt+"…").width>maxW) txt=txt.slice(0,-1);
      return txt+"…";
    }

    for(var d=1; d<=days; d++){
      var idx=first+d-1, r=Math.floor(idx/7), c=idx%7;
      var cx=m+cellW*c+cellW/2;
      var cy=gy+cellH*r;
      var isToday = curY===today.getFullYear()&&curM===today.getMonth()&&d===today.getDate();
      var k=key(curY,curM,d);
      var list=events[k]||[];

      // glass chip for days with events
      if(list.length){
        roundRect(ctx, m+cellW*c+cellW*0.05, cy+cellH*0.03, cellW*0.9, cellH*0.94, W*0.02);
        ctx.fillStyle=C.chip;
        ctx.fill();
        ctx.strokeStyle = dark?"rgba(255,255,255,0.14)":"rgba(255,255,255,0.8)";
        ctx.lineWidth=Math.max(1,W*0.0012);
        ctx.stroke();
      }

      // date number
      var ny=cy+numF*1.5;
      if(isToday){
        var tr=numF*0.85;
        ctx.save();
        ctx.shadowColor="rgba(255,69,58,0.55)";
        ctx.shadowBlur=tr*0.9;
        ctx.fillStyle=C.accent;
        ctx.beginPath();
        ctx.arc(cx, ny-numF*0.36, tr, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
        // glass highlight on the circle
        var cg=ctx.createLinearGradient(0,ny-numF*0.36-tr,0,ny-numF*0.36+tr);
        cg.addColorStop(0,"rgba(255,255,255,0.45)");
        cg.addColorStop(0.5,"rgba(255,255,255,0)");
        ctx.fillStyle=cg;
        ctx.beginPath();
        ctx.arc(cx, ny-numF*0.36, tr, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle="#fff";
      } else {
        ctx.fillStyle = c===0?C.accent : c===6?C.blue : C.text;
      }
      ctx.font=(isToday?"800 ":"600 ")+numF+"px "+F;
      ctx.fillText(d, cx, ny);

      // events
      ctx.font="700 "+evF+"px "+F;
      var maxLines=Math.max(0, Math.floor((cellH-numF*2.1)/evLH));
      var shown=Math.min(list.length, maxLines);
      var extra=list.length-shown;
      if(extra>0 && shown>0) shown--;
      for(var j=0;j<shown;j++){
        ctx.fillStyle=list[j].c;
        ctx.fillText(truncate(list[j].t, cellW*0.88), cx, ny+numF*0.9+evLH*(j+1)-evLH*0.25);
      }
      if(list.length>shown){
        ctx.fillStyle=C.sub;
        ctx.fillText("+"+(list.length-shown), cx, ny+numF*0.9+evLH*(shown+1)-evLH*0.25);
      }
    }
    ctx.textAlign="left";
    return cv;
  }

  $("exportBtn").onclick=function(){
    var cv=draw();
    var url=cv.toDataURL("image/png");
    $("resultImg").src=url;
    $("dlLink").href=url;
    $("dlLink").download="lockscreen-"+curY+"-"+String(curM+1).padStart(2,"0")+".png";
    $("overlay").classList.add("show");
  };
  $("closeBtn").onclick=function(){ $("overlay").classList.remove("show"); };

  /* ---------- init ---------- */
  render();
})();
</script>
</body>
</html>
